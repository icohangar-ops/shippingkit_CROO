name: ShipKit E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      provider:
        description: Provider file to validate
        required: false
        default: tests/fixtures/sample-provider.ts
      expect-type:
        description: Expected DeliverableType (text|schema)
        required: false
        default: text

jobs:
  e2e:
    name: Validate provider against @croo-network/sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # push thumbnails to the e2e-artifacts branch
      pull-requests: write  # post / update the PR comment

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Recreate @croo-network/sdk mock shim
        run: |
          mkdir -p node_modules/@croo-network/sdk
          cat > node_modules/@croo-network/sdk/package.json <<'JSON'
          {"name":"@croo-network/sdk","version":"0.0.0-mock","type":"module","main":"index.ts","module":"index.ts","types":"index.ts"}
          JSON
          echo 'export * from "../../../tests/mocks/croo-network-sdk";' > node_modules/@croo-network/sdk/index.ts

      - name: Static CAP conformance
        id: static
        run: bun ./scripts/test-shipkit.ts

      - name: E2E lifecycle (writes reports/)
        id: e2e
        run: |
          bun ./scripts/e2e-shipkit.ts \
            --provider "${{ github.event.inputs.provider || 'tests/fixtures/sample-provider.ts' }}" \
            --expect-type "${{ github.event.inputs.expect-type || 'text' }}" \
            --report-dir reports \
            --report-name "e2e-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Render timeline SVG + PNG
        if: always() && hashFiles('reports/*.json') != ''
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends imagemagick librsvg2-bin >/dev/null
          bun ./scripts/render-timeline.ts --dir reports
          shopt -s nullglob
          for svg in reports/*-timeline.svg reports/*-step-*.svg; do
            [ -e "$svg" ] || continue
            png="${svg%.svg}.png"
            rsvg-convert -b "#0b0f17" -o "$png" "$svg" 2>/dev/null \
              || magick -background "#0b0f17" "$svg" "$png"
          done
          ls -la reports/

      - name: Publish thumbnails to e2e-artifacts branch
        id: publish_thumbs
        if: github.event_name == 'pull_request' && hashFiles('reports/*-step-*.png') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          ATTEMPT: ${{ github.run_attempt }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -e
          DEST="pr-${PR_NUM}/run-${RUN_ID}-${ATTEMPT}"
          STAGE=$(mktemp -d)
          git clone --depth=1 --branch e2e-artifacts \
              "https://x-access-token:${GH_TOKEN}@github.com/${REPO_FULL}.git" "$STAGE" 2>/dev/null || {
            git init -q "$STAGE"
            (cd "$STAGE" && git checkout -q --orphan e2e-artifacts && git rm -rfq . 2>/dev/null || true)
          }
          mkdir -p "$STAGE/$DEST"
          # Detect ALL prior attempts for this PR (if any) BEFORE we commit
          # the current run, then stash every attempt's JSON locally so the
          # PR comment can diff current-vs-previous and fall back when the
          # immediate previous attempt is missing a step.
          ALL_PREV=$(ls -1d "$STAGE/pr-${PR_NUM}"/run-* 2>/dev/null | sort -V || true)
          PREV_DIR=""
          PREV_SLUG=""
          if [ -n "$ALL_PREV" ]; then
            PREV_DIR=$(echo "$ALL_PREV" | tail -n1)
            PREV_SLUG=$(basename "$PREV_DIR")
            for prev_dir in $ALL_PREV; do
              prev_slug=$(basename "$prev_dir")
              mkdir -p "/tmp/prev-reports/${prev_slug}"
              cp "$prev_dir"/*.json "/tmp/prev-reports/${prev_slug}/" 2>/dev/null || true
              # Stash published SHA256SUMS.txt so the PR comment can surface
              # verified checksums for each matched baseline artifact.
              cp "$prev_dir"/SHA256SUMS.txt "/tmp/prev-reports/${prev_slug}/" 2>/dev/null || true
            done
            echo "prev_base_url=https://github.com/${REPO_FULL}/raw/e2e-artifacts/pr-${PR_NUM}/${PREV_SLUG}" >> "$GITHUB_OUTPUT"
            echo "prev_slug=${PREV_SLUG}" >> "$GITHUB_OUTPUT"
            # Newest-first comma-separated list for fallback scanning in JS
            ALL_SLUGS=$(echo "$ALL_PREV" | sort -Vr | xargs -n1 basename | paste -sd ',' -)
            echo "prev_slugs=${ALL_SLUGS}" >> "$GITHUB_OUTPUT"
            echo "Previous attempts: ${ALL_SLUGS}"
          else
            echo "No previous attempt on e2e-artifacts branch."
          fi
          # Publish current run: timeline + per-step PNGs + JSON (for next-run diffs).
          cp reports/*-timeline.png reports/*-step-*.png reports/*.json "$STAGE/$DEST/" 2>/dev/null || true
          # Generate SHA256 checksums so reviewers can verify downloaded
          # artifacts (individual files AND files extracted from the ZIP)
          # match exactly what was published from this run.
          ( cd "$STAGE/$DEST" && \
            sha256sum *.json *.png 2>/dev/null | LC_ALL=C sort -k2 > SHA256SUMS.txt && \
            echo "Published SHA256SUMS.txt:" && cat SHA256SUMS.txt ) || true
          ls "$STAGE/$DEST/" || true
          cd "$STAGE"
          git config user.email "shipkit-e2e@users.noreply.github.com"
          git config user.name  "shipkit-e2e-bot"
          git add -A "$DEST"
          git commit -qm "e2e thumbs PR#${PR_NUM} run ${RUN_ID}.${ATTEMPT}" || { echo "nothing to commit"; exit 0; }
          git push -q "https://x-access-token:${GH_TOKEN}@github.com/${REPO_FULL}.git" HEAD:e2e-artifacts
          echo "base_url=https://github.com/${REPO_FULL}/raw/e2e-artifacts/${DEST}" >> "$GITHUB_OUTPUT"

      - name: Verify published baseline SHA256 checksums
        id: verify_baselines
        if: always() && github.event_name == 'pull_request' && steps.publish_thumbs.outputs.prev_slugs != ''
        env:
          REPO_FULL: ${{ github.repository }}
          PREV_SLUGS: ${{ steps.publish_thumbs.outputs.prev_slugs }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          # Re-download every published baseline artifact + its SHA256SUMS.txt
          # from the e2e-artifacts branch and run `sha256sum -c` against the
          # raw files. Result is written as JSON for the PR comment step to
          # render a pass/fail summary alongside the comparison blocks.
          set -u
          OUT=/tmp/baseline-verify.json
          mkdir -p /tmp/verify-baselines
          printf '{"slugs":[' > "$OUT"
          first=1
          IFS=',' read -ra SLUGS <<< "$PREV_SLUGS"
          for slug in "${SLUGS[@]}"; do
            [ -n "$slug" ] || continue
            base="https://github.com/${REPO_FULL}/raw/e2e-artifacts/pr-${PR_NUM}/${slug}"
            work=/tmp/verify-baselines/$slug
            mkdir -p "$work"
            sums_status="missing"; pass=0; fail=0; total=0; detail=""
            if curl -fsSL "$base/SHA256SUMS.txt" -o "$work/SHA256SUMS.txt"; then
              sums_status="ok"
              # Download every file referenced by SHA256SUMS.txt
              while read -r hash name; do
                [ -n "$name" ] || continue
                name="${name#\*}"
                total=$((total + 1))
                if curl -fsSL "$base/$name" -o "$work/$name"; then
                  actual=$(sha256sum "$work/$name" | awk '{print $1}')
                  if [ "$actual" = "$hash" ]; then
                    pass=$((pass + 1))
                  else
                    fail=$((fail + 1))
                    detail="${detail}${detail:+\\n}${name}: expected ${hash:0:12}…, got ${actual:0:12}…"
                  fi
                else
                  fail=$((fail + 1))
                  detail="${detail}${detail:+\\n}${name}: download failed"
                fi
              done < "$work/SHA256SUMS.txt"
            fi
            [ $first -eq 1 ] || printf ',' >> "$OUT"
            first=0
            printf '{"slug":"%s","sums":"%s","pass":%d,"fail":%d,"total":%d,"detail":"%s"}' \
              "$slug" "$sums_status" "$pass" "$fail" "$total" "$detail" >> "$OUT"
            echo "  → ${slug}: sums=${sums_status} pass=${pass} fail=${fail} total=${total}"
          done
          printf ']}' >> "$OUT"
          cat "$OUT"
          echo "report=$OUT" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always()
        run: |
          echo "## ShipKit E2E — run ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -d reports ]; then
            echo "| Report | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            for f in reports/*.json; do
              [ -e "$f" ] || continue
              name=$(basename "$f" .json)
              exit_code=$(jq -r '.exitCode' "$f")
              ok=$(jq -r '.counts.ok' "$f"); fail=$(jq -r '.counts.fail' "$f"); warn=$(jq -r '.counts.warn' "$f")
              status=$([ "$exit_code" = "0" ] && echo "✅ pass" || echo "❌ fail")
              echo "| \`$name\` | $status — ${ok} ok / ${fail} fail / ${warn} warn |" >> "$GITHUB_STEP_SUMMARY"
            done
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Download the **shipkit-e2e-reports** artifact below for the full HTML/JSON timeline (with one-click failing-trace export)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No reports generated — the harness exited before writing._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports (HTML + JSON)
        id: upload_reports
        if: always() && hashFiles('reports/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: shipkit-e2e-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/*.html
            reports/*.json
            reports/*-timeline.svg
            reports/*-timeline.png
            reports/*-step-*.svg
            reports/*-step-*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload failing-trace bundle
        if: failure() && hashFiles('reports/*.json') != ''
        run: |
          mkdir -p reports/failing
          for f in reports/*.json; do
            [ -e "$f" ] || continue
            jq '[.timeline[] | select(.status=="fail" or .status=="warn")]' "$f" \
              > "reports/failing/$(basename "$f" .json)-failing.json"
          done

      - name: Upload failing-trace artifact
        id: upload_failing
        if: failure() && hashFiles('reports/failing/*.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: shipkit-e2e-failing-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/failing/*.json
          retention-days: 30

      - name: PR check summary comment
        if: always() && github.event_name == 'pull_request' && hashFiles('reports/*.json') != ''
        uses: actions/github-script@v7
        env:
          REPORTS_URL: ${{ steps.upload_reports.outputs.artifact-url }}
          FAILING_URL: ${{ steps.upload_failing.outputs.artifact-url }}
          THUMBS_BASE_URL: ${{ steps.publish_thumbs.outputs.base_url }}
          PREV_THUMBS_BASE_URL: ${{ steps.publish_thumbs.outputs.prev_base_url }}
          PREV_SLUG: ${{ steps.publish_thumbs.outputs.prev_slug }}
          PREV_SLUGS: ${{ steps.publish_thumbs.outputs.prev_slugs }}
          BASELINE_VERIFY_REPORT: ${{ steps.verify_baselines.outputs.report }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const crypto = require('crypto');
            const dir = 'reports';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            if (!files.length) return;

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const reportsUrl = process.env.REPORTS_URL || `${runUrl}#artifacts`;
            const failingUrl = process.env.FAILING_URL || '';
            const thumbsBase = process.env.THUMBS_BASE_URL || '';
            const prevThumbsBase = process.env.PREV_THUMBS_BASE_URL || '';
            const prevSlug = process.env.PREV_SLUG || '';
            const PREV_DIR = '/tmp/prev-reports';
            const hasPrev = !!prevThumbsBase && fs.existsSync(PREV_DIR);

            // SHA256 helpers — parse published SHA256SUMS.txt for baselines
            // and compute on-the-fly for the current attempt's local files
            // so reviewers can verify downloads byte-for-byte.
            const parseSums = (file) => {
              const map = {};
              try {
                for (const line of fs.readFileSync(file, 'utf8').split('\n')) {
                  const m = line.match(/^([0-9a-f]{64})\s+\*?(.+)$/i);
                  if (m) map[m[2].trim()] = m[1].toLowerCase();
                }
              } catch {}
              return map;
            };
            const baselineSumsCache = {};
            const baselineSumsFor = (slug) => {
              if (!(slug in baselineSumsCache)) {
                baselineSumsCache[slug] = parseSums(path.join(PREV_DIR, slug, 'SHA256SUMS.txt'));
              }
              return baselineSumsCache[slug];
            };

            // Automated baseline verification report (per-slug pass/fail).
            // Produced by the "Verify published baseline SHA256 checksums"
            // step, which re-downloads every artifact from the raw URL and
            // runs sha256sum -c against the published SHA256SUMS.txt.
            let verifySlugs = [];
            try {
              const p = process.env.BASELINE_VERIFY_REPORT;
              if (p && fs.existsSync(p)) {
                verifySlugs = JSON.parse(fs.readFileSync(p, 'utf8')).slugs || [];
              }
            } catch {}
            const verifyBySlug = Object.fromEntries(verifySlugs.map(s => [s.slug, s]));
            const verifyBadge = (s) => {
              if (!s || s.sums !== 'ok') return '⚪ checksums file missing';
              if (s.fail === 0 && s.pass > 0) return `🟢 ${s.pass}/${s.total} verified`;
              if (s.fail > 0) return `🔴 ${s.fail}/${s.total} mismatch`;
              return '⚪ no files';
            };
            const overallVerify = (() => {
              if (!verifySlugs.length) return '';
              const totals = verifySlugs.reduce((a, s) => ({
                pass: a.pass + (s.pass || 0), fail: a.fail + (s.fail || 0), total: a.total + (s.total || 0),
              }), { pass: 0, fail: 0, total: 0 });
              const icon = totals.fail === 0 ? '🟢' : '🔴';
              const status = totals.fail === 0 ? 'All baseline artifacts verified' : `${totals.fail} mismatched file(s) detected`;
              const rows = verifySlugs.map(s => {
                const det = s.detail ? `<br><sub><code>${s.detail.replace(/\\n/g, '<br>')}</code></sub>` : '';
                return `<tr><td><code>${s.slug}</code></td><td>${verifyBadge(s)}</td><td><sub>${s.pass} pass · ${s.fail} fail · ${s.total} total</sub>${det}</td></tr>`;
              }).join('');
              return `\n<details${totals.fail ? ' open' : ''}><summary>${icon} <b>Baseline SHA256 verification</b> — ${status} (${totals.pass}/${totals.total} files across ${verifySlugs.length} attempt${verifySlugs.length === 1 ? '' : 's'})</summary>\n\n` +
                     `<sub>Automated check: each published baseline artifact was re-downloaded from the raw URL and compared against the attempt's <code>SHA256SUMS.txt</code>.</sub>\n\n` +
                     `<table><tr><th align="left">Attempt</th><th align="left">Result</th><th align="left">Details</th></tr>${rows}</table>\n</details>\n`;
            })();
            const currentSumsCache = {};
            const currentSumFor = (name) => {
              if (!(name in currentSumsCache)) {
                try {
                  const buf = fs.readFileSync(path.join(dir, name));
                  currentSumsCache[name] = crypto.createHash('sha256').update(buf).digest('hex');
                } catch { currentSumsCache[name] = ''; }
              }
              return currentSumsCache[name];
            };
            const shortSum = (s) => s ? `<code title="sha256:${s}">${s.slice(0, 12)}…</code>` : '<code>n/a</code>';

            // Build a click-to-expand "Verify downloads" button. GitHub
            // comments can't execute JS, so the button reveals a copy-paste
            // one-liner that downloads every artifact + SHA256SUMS.txt and
            // runs `sha256sum -c` so reviewers get a single OK/FAIL report.
            const verifyButton = (label, baseUrl, fileNames) => {
              const files = fileNames.filter(Boolean).map(n => `'${n.replace(/'/g, "'\\''")}'`).join(' ');
              const snippet =
                `set -e\n` +
                `tmp=$(mktemp -d) && cd "$tmp"\n` +
                `base='${baseUrl}'\n` +
                `for f in SHA256SUMS.txt ${files}; do\n` +
                `  curl -fsSL "$base/$f" -o "$f"\n` +
                `done\n` +
                `grep -E " (${fileNames.filter(Boolean).map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\\\$&')).join('|')})$" SHA256SUMS.txt | sha256sum -c -\n` +
                `echo "Verified in: $tmp"`;
              return `<details><summary>🔐 ${label}</summary>\n\n` +
                     `<sub>GitHub comments can't run scripts — copy this snippet to verify every downloaded file's SHA-256 matches what was published. Outputs <code>OK</code> per file or a clear mismatch.</sub>\n\n` +
                     `\`\`\`bash\n${snippet}\n\`\`\`\n` +
                     `</details>`;
            };

            // Tiny line-level unified diff (no deps).
            const diffLines = (a, b) => {
              const A = String(a ?? '').split('\n');
              const B = String(b ?? '').split('\n');
              const out = [];
              const max = Math.max(A.length, B.length);
              for (let i = 0; i < max; i++) {
                if (A[i] === B[i]) { if (A[i] !== undefined) out.push('  ' + A[i]); continue; }
                if (A[i] !== undefined) out.push('- ' + A[i]);
                if (B[i] !== undefined) out.push('+ ' + B[i]);
              }
              return out.join('\n');
            };
            const stepKey = (e) => `${e.phase}::${e.label}`;
            const prevSlugs = (process.env.PREV_SLUGS || '').split(',').filter(Boolean);

            const findPrevStep = (currentStep, filename) => {
              if (!prevSlugs.length) return null;
              const key = stepKey(currentStep);
              for (const slug of prevSlugs) {
                const prevPath = path.join(PREV_DIR, slug, filename);
                if (!fs.existsSync(prevPath)) continue;
                let prevReport;
                try { prevReport = JSON.parse(fs.readFileSync(prevPath, 'utf8')); } catch { continue; }
                const pTimeline = prevReport.timeline || [];
                const pIdx = pTimeline.findIndex(x => stepKey(x) === key);
                if (pIdx >= 0) {
                  const baseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/raw/e2e-artifacts/pr-${context.issue.number}/${slug}`;
                  return { report: prevReport, step: pTimeline[pIdx], idx: pIdx, slug, baseUrl };
                }
              }
              return null;
            };

            const MARKER = '<!-- shipkit-e2e-summary -->';
            const sections = [];
            let anyFail = false, totalOk = 0, totalFail = 0, totalWarn = 0;

            for (const f of files) {
              const r = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              totalOk += r.counts.ok; totalFail += r.counts.fail; totalWarn += r.counts.warn;
              const failed = (r.timeline || []).filter(e => e.status === 'fail' || e.status === 'warn');
              const pass = r.exitCode === 0;
              if (!pass) anyFail = true;
              const badge = pass ? (r.counts.warn ? '🟡 pass (warnings)' : '🟢 pass') : '🔴 fail';
              const head = `### ${badge} — \`${r.name}\`\n` +
                `provider \`${r.provider}\` · ${r.durationMs}ms · ${r.counts.ok} ok / ${r.counts.fail} fail / ${r.counts.warn} warn`;

              // Inline rendered ASCII timeline (renders in markdown code block).
              const ICON = { ok: '✓', fail: '✗', warn: '!', info: '▸' };
              const tl = (r.timeline || []).map(e => {
                const ts = `+${e.ts}ms`.padStart(8);
                const ph = e.phase.padEnd(9);
                return `${ts}  ${ICON[e.status] || '·'} ${ph} ${e.label.slice(0, 90)}`;
              }).join('\n');
              const timelineBlock =
                `<details><summary>📈 Event timeline (${(r.timeline||[]).length} steps)</summary>\n\n\`\`\`\n${tl}\n\`\`\`\n</details>`;

              if (!failed.length) { sections.push(`${head}\n\n${timelineBlock}`); continue; }

              // Cross-attempt comparison with automatic fallback to older attempts.

              // Key payload diffs for every failing/warning step.
              const diffBlocks = failed.slice(0, 6).map(e => {
                const icon = e.status === 'fail' ? '❌' : '⚠️';
                const exp = e.expected !== undefined ? JSON.stringify(e.expected, null, 2) : '—';
                const act = e.actual   !== undefined ? JSON.stringify(e.actual,   null, 2) : '—';
                const diff = e.diff ? `\n\n**diff**\n\`\`\`diff\n${e.diff}\n\`\`\`` : '';
                const tlIdx = (r.timeline || []).indexOf(e);
                const curStepFileName = `${r.name}-step-${String(tlIdx).padStart(3,'0')}.png`;
                const curTimelineFileName = `${r.name}-timeline.png`;
                const curJsonFileName = `${r.name}.json`;
                const thumb = thumbsBase && tlIdx >= 0
                  ? `\n\n<a href="${thumbsBase}/${r.name}-timeline.png#step-${tlIdx + 1}" title="Open full-size timeline (step #${tlIdx + 1})"><img alt="step #${tlIdx + 1} timeline thumbnail — click to expand" width="640" src="${thumbsBase}/${curStepFileName}"></a>\n<sub>🔍 <a href="${thumbsBase}/${curTimelineFileName}">Click to open full-size timeline →</a> · sha256 ${shortSum(currentSumFor(curStepFileName))} (step) · ${shortSum(currentSumFor(curTimelineFileName))} (timeline) · <a href="${thumbsBase}/SHA256SUMS.txt" title="Download SHA256SUMS.txt for this attempt" download>🔐 SHA256SUMS.txt</a></sub>\n\n${verifyButton('Verify downloads (current attempt)', thumbsBase, [curJsonFileName, curTimelineFileName, curStepFileName])}\n`
                  : '';

                // Cross-attempt comparison block: search previous attempts
                // newest→oldest and fall back automatically when the step is
                // missing from the immediate previous run.
                let compareBlock = '';
                const matched = findPrevStep(e, f);
                if (matched) {
                  const { step: p, idx: pIdx, slug: matchedSlug, baseUrl: matchedBase } = matched;
                  const curStepPng = `${thumbsBase}/${r.name}-step-${String(tlIdx).padStart(3,'0')}.png`;
                  const prevStepPng = `${matchedBase}/${r.name}-step-${String(pIdx).padStart(3,'0')}.png`;
                  const curFullPng = `${thumbsBase}/${r.name}-timeline.png#step-${tlIdx + 1}`;
                  const prevFullPng = `${matchedBase}/${r.name}-timeline.png#step-${pIdx + 1}`;
                  const statusDiff = (p.status !== e.status)
                    ? `\n\n**status:** \`${p.status}\` → \`${e.status}\``
                    : `\n\n_Status unchanged (\`${e.status}\`)._`;
                  const expDiff = diffLines(
                    p.expected !== undefined ? JSON.stringify(p.expected, null, 2) : '',
                    e.expected !== undefined ? JSON.stringify(e.expected, null, 2) : '',
                  );
                  const actDiff = diffLines(
                    p.actual !== undefined ? JSON.stringify(p.actual, null, 2) : '',
                    e.actual !== undefined ? JSON.stringify(e.actual, null, 2) : '',
                  );
                  const matchedRunId = matchedSlug.split('-')[1];
                  const baselineRunLink = matchedRunId
                    ? ` — <a href="${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${matchedRunId}" title="Open baseline run on GitHub Actions">🔧 View baseline run →</a>`
                    : '';
                  const baselineJsonUrl = `${matchedBase}/${r.name}.json`;
                  const baselineTimelinePng = `${matchedBase}/${r.name}-timeline.png`;
                  const baselineStepPng = `${matchedBase}/${r.name}-step-${String(pIdx).padStart(3,'0')}.png`;
                  const baseSums = baselineSumsFor(matchedSlug);
                  const baselineJsonName = `${r.name}.json`;
                  const baselineTimelineName = `${r.name}-timeline.png`;
                  const baselineStepName = `${r.name}-step-${String(pIdx).padStart(3,'0')}.png`;
                  const baselineSumsUrl = `${matchedBase}/SHA256SUMS.txt`;
                  const sumJson = baseSums[baselineJsonName] || '';
                  const sumTimeline = baseSums[baselineTimelineName] || '';
                  const sumStep = baseSums[baselineStepName] || '';
                  const baselineDownloadsBlock =
                    `<details><summary>⬇️ Individual downloads (fallback if ZIP fails)</summary>\n` +
                    `<p><sub>` +
                    `<a href="${baselineJsonUrl}" title="Download baseline JSON report" download>⬇️ JSON report</a> ${shortSum(sumJson)}` +
                    ` · <a href="${baselineTimelinePng}" title="Download baseline full timeline PNG" download>⬇️ Full timeline</a> ${shortSum(sumTimeline)}` +
                    ` · <a href="${baselineStepPng}" title="Download baseline step #${pIdx + 1} thumbnail" download>⬇️ Step #${pIdx + 1} PNG</a> ${shortSum(sumStep)}` +
                    ` · <a href="${baselineSumsUrl}" title="Download SHA256SUMS.txt for the matched baseline attempt" download>🔐 SHA256SUMS.txt</a>` +
                    `</sub></p>\n` +
                    `<p><sub>Verify any file with <code>sha256sum -c SHA256SUMS.txt</code> (or compare the prefix shown above). The ZIP is generated on demand by <code>download-directory.github.io</code>; once extracted, its files match these same sums.</sub></p>` +
                    `\n${verifyButton('Verify downloads (matched baseline)', matchedBase, [baselineJsonName, baselineTimelineName, baselineStepName])}\n` +
                    `</details>`;
                  const baselineTreeUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/tree/e2e-artifacts/pr-${context.issue.number}/${matchedSlug}`;
                  const baselineZipUrl = `https://download-directory.github.io/?url=${encodeURIComponent(baselineTreeUrl)}`;
                  const baselineZipLink = `<a href="${baselineZipUrl}" title="Download all matched baseline artifacts (JSON + PNGs) as a single ZIP">📦 Download all as ZIP</a>`;
                  compareBlock =
                    `\n\n<details><summary>🆚 Compare against previous attempt (<code>${matchedSlug}</code>)</summary>\n\n` +
                    `<p><sub>${baselineRunLink} · ${baselineZipLink}</sub></p>\n` +
                    `${baselineDownloadsBlock}\n` +
                    `<table><tr>` +
                    `<th align="left">Previous (<code>+${p.ts}ms</code>)</th>` +
                    `<th align="left">Current (<code>+${e.ts}ms</code>)</th>` +
                    `</tr><tr>` +
                    `<td><a href="${prevFullPng}" title="Open previous full-size timeline"><img width="360" src="${prevStepPng}" alt="previous step #${pIdx + 1}"></a></td>` +
                    `<td><a href="${curFullPng}" title="Open current full-size timeline"><img width="360" src="${curStepPng}" alt="current step #${tlIdx + 1}"></a></td>` +
                    `</tr></table>\n` +
                    `${statusDiff}\n\n` +
                    `**expected (prev → current)**\n\`\`\`diff\n${expDiff || '(no change)'}\n\`\`\`\n\n` +
                    `**actual (prev → current)**\n\`\`\`diff\n${actDiff || '(no change)'}\n\`\`\`\n` +
                    `</details>`;
                } else {
                  compareBlock = `\n\n<sub>🆕 Step not present in any previous attempt.</sub>`;
                }

                return `<details open><summary>${icon} <code>+${e.ts}ms</code> · <b>${e.phase}</b> · ${e.label.replace(/</g,'&lt;')}</summary>${thumb}\n` +
                       `**expected**\n\`\`\`json\n${exp}\n\`\`\`\n\n**actual**\n\`\`\`json\n${act}\n\`\`\`${diff}${compareBlock}\n</details>`;
              }).join('\n');
              const more = failed.length > 6 ? `\n_+${failed.length - 6} more failing steps — see HTML report._` : '';
              sections.push(`${head}\n\n${timelineBlock}\n\n#### Key payload diffs\n${diffBlocks}${more}`);
            }

            const overall = anyFail ? '🔴 **FAIL**' : (totalWarn ? '🟡 **PASS (with warnings)**' : '🟢 **PASS**');
            const links = [
              `[📦 HTML + JSON + timeline.png](${reportsUrl})`,
              failingUrl ? `[⬇ Failing traces](${failingUrl})` : null,
              `[🔧 Run logs](${runUrl})`,
            ].filter(Boolean).join(' · ');

            const body = [
              MARKER,
              `## ShipKit E2E ${overall}`,
              `${totalOk} ok · ${totalFail} fail · ${totalWarn} warn — ${links}`,
              '',
              thumbsBase
                ? `_Failing-step thumbnails embedded below render the focal event with two-step context on either side. Full lane chart in the artifact bundle._`
                : `_The artifact bundle includes a rendered \`*-timeline.png\` per report — download it for the full lane chart._`,
              '',
              overallVerify,
              ...sections,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const prev = comments.find(c => c.body && c.body.includes(MARKER));
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prev.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }